name: sega-aorta
channels:
  - conda-forge
  - defaults
dependencies:
  # Keep the Conda solve intentionally small and stable.
  # The setup script installs PyTorch, MONAI, SimpleITK, mesh packages, etc. with pip.
  - python=3.10
  - pip>=23
  - jupyterlab>=4,<5
  - ipykernel>=6.29,<7
  - ipywidgets>=8.1,<9
  - wheel
  - setuptools
